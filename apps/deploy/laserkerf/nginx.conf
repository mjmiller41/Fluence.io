# LaserKerf PWA. TLS/domains are the shared Caddy proxy's job — this container only
# ever speaks plain HTTP on the internal Docker network, on the editor-range port 8000.

server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/wasm application/manifest+json text/plain;
    gzip_min_length 1024;

    # Hashed build assets: cache forever (immutable).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # PWA control files MUST always revalidate so a new deploy reaches installed clients.
    location = /sw.js         { add_header Cache-Control "no-cache"; }
    location = /registerSW.js { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # App shell — always revalidate; SPA fallback to index.html.
    location / {
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options "nosniff";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        try_files $uri $uri/ /index.html;
    }
}
